name: Deploy (Cloud Run)

# Manual build+push+deploy of the REST API and/or MCP service to Cloud Run, per
# dev/deployment.md. Requires two repo secrets:
#   GCP_SA_KEY      - JSON key for a deploy service account (see dev/deployment.md for
#                      required roles: roles/run.admin, roles/artifactregistry.writer,
#                      roles/cloudbuild.builds.editor, roles/iam.serviceAccountUser,
#                      roles/storage.admin, roles/serviceusage.serviceUsageConsumer)
#   GCP_PROJECT_ID  - the target GCP project ID
#
# Assumes the one-time project setup (API enablement, Artifact Registry repo creation) in
# dev/deployment.md step 1 has already been done.

on:
  workflow_dispatch:
    inputs:
      target:
        description: "Which service(s) to deploy"
        type: choice
        options: [rest, mcp, both]
        default: rest
      region:
        description: "Cloud Run region"
        type: string
        default: us-central1
      repo:
        description: "Artifact Registry repo name"
        type: string
        default: idc
      image_tag:
        description: "Image tag (defaults to the short commit SHA)"
        type: string
        default: ""

permissions:
  contents: read

concurrency:
  group: deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Resolve image tag
        id: vars
        run: |
          TAG="${{ inputs.image_tag }}"
          if [ -z "$TAG" ]; then TAG="${GITHUB_SHA:0:7}"; fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "image=${{ inputs.region }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/${{ inputs.repo }}/idc-api-v3:$TAG" >> "$GITHUB_OUTPUT"

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ secrets.GCP_PROJECT_ID }}

      - name: Build & push image (Cloud Build)
        run: |
          gcloud builds submit --config dev/cloudbuild.yaml \
            --substitutions _IMAGE="${{ steps.vars.outputs.image }}"

      - name: Deploy REST API
        if: ${{ inputs.target == 'rest' || inputs.target == 'both' }}
        run: |
          gcloud run deploy idc-api-v3 \
            --image "${{ steps.vars.outputs.image }}" \
            --region "${{ inputs.region }}" \
            --allow-unauthenticated \
            --cpu 2 --memory 4Gi \
            --concurrency 40 \
            --min-instances 0 --max-instances 5 \
            --cpu-boost \
            --set-env-vars IDC_API_DUCKDB_MEMORY_LIMIT=3GB,IDC_API_DUCKDB_THREADS=2

      - name: Deploy MCP service
        if: ${{ inputs.target == 'mcp' || inputs.target == 'both' }}
        run: |
          gcloud run deploy idc-mcp-v3 \
            --image "${{ steps.vars.outputs.image }}" \
            --region "${{ inputs.region }}" \
            --allow-unauthenticated \
            --cpu 2 --memory 4Gi \
            --min-instances 0 --max-instances 5 \
            --command idc-mcp \
            --args=--http,--host,0.0.0.0,--port,8080 \
            --set-env-vars IDC_API_DUCKDB_MEMORY_LIMIT=3GB,IDC_API_DUCKDB_THREADS=2,IDC_API_BUILD=${{ steps.vars.outputs.tag }}

      - name: Verify REST API
        if: ${{ inputs.target == 'rest' || inputs.target == 'both' }}
        run: |
          URL=$(gcloud run services describe idc-api-v3 --region "${{ inputs.region }}" --format='value(status.url)')
          curl -sf "$URL/health"; echo
          {
            echo "### REST API deployed"
            echo "$URL"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Verify MCP service
        if: ${{ inputs.target == 'mcp' || inputs.target == 'both' }}
        run: |
          URL=$(gcloud run services describe idc-mcp-v3 --region "${{ inputs.region }}" --format='value(status.url)')
          {
            echo "### MCP service deployed"
            echo "$URL/mcp"
          } >> "$GITHUB_STEP_SUMMARY"

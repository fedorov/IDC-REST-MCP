name: Deploy to Cloud Run (reusable)

# Reusable deploy job shared by build-and-deploy-dev.yml (dev) and promote.yml (test / prod).
# It never builds — it deploys an already-pushed image by its immutable @sha256 digest, so the
# bytes that ran in test are exactly the bytes that run in prod (the DuckDB index is baked at
# build time). Per-tier config comes from the GitHub Environment named by `environment`:
#   Secrets:   GCP_PROJECT_ID, GCP_SA_KEY   (deployer SA for that tier's GCP project)
#   Variables: RUNTIME_SA (dedicated Cloud Run runtime SA; optional — default compute SA if unset)
#              REGION, AR_REPO, CPU, MEMORY, CONCURRENCY, MIN_INSTANCES, MAX_INSTANCES,
#              DUCKDB_MEMORY_LIMIT, DUCKDB_THREADS, HSTS_MAX_AGE   (all optional; defaults below)
#              PUBLIC_BASE_URL (REQUIRED for the post-deploy example smoke test: the tier's public
#                URL behind the load balancer. The smoke step fails if it is unset — it does not
#                fall back to the *.run.app URL, which would skip the user-facing surface)
#              SMOKE_SOFT_FAIL (set truthy to downgrade example-smoke failures to warnings)
#
# Image source: by default the image is resolved from THIS tier's own registry
#   <REGION>-docker.pkg.dev/<GCP_PROJECT_ID>/<AR_REPO>/idc-api-v3:<build_label>
# (dev and test build into their own registry). For prod, pass `source_image` = the full test
# registry reference, since prod deploys test's image directly (prod's deployer + Cloud Run
# service agent are granted read on test's Artifact Registry). See dev/deployment.md.

on:
  workflow_call:
    inputs:
      environment:
        description: "Target GitHub Environment / tier (dev | test | prod)"
        required: true
        type: string
      build_label:
        description: "Short commit SHA — the image tag to deploy and the IDC_API_BUILD stamp"
        required: true
        type: string
      target:
        description: "Which service(s) to deploy (rest | mcp | both)"
        required: false
        type: string
        default: both
      source_image:
        description: "Full image ref (with tag) to deploy; empty = build it from this tier's own registry"
        required: false
        type: string
        default: ""

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    concurrency:
      group: deploy-${{ inputs.environment }}
      cancel-in-progress: false
    steps:
      - name: Check out repo
        uses: actions/checkout@v7
        # Needed for dev/smoke_openapi_examples.py in the post-deploy verify. The script is
        # spec-driven (it reads the deployed /v3/openapi.json), so the checked-out ref only has
        # to supply the script itself.

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v3
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v3
        with:
          project_id: ${{ secrets.GCP_PROJECT_ID }}

      - name: Resolve image digest
        id: img
        env:
          SOURCE_IMAGE: ${{ inputs.source_image }}
          PROJECT: ${{ secrets.GCP_PROJECT_ID }}
          REGION: ${{ vars.REGION || 'us-central1' }}
          AR_REPO: ${{ vars.AR_REPO || 'idc' }}
          BUILD_LABEL: ${{ inputs.build_label }}
        run: |
          set -euo pipefail
          REF="${SOURCE_IMAGE:-${REGION}-docker.pkg.dev/${PROJECT}/${AR_REPO}/idc-api-v3:${BUILD_LABEL}}"
          # Pin to the immutable digest so the deploy can't drift off a moving tag. Capture the
          # exit code explicitly — under `set -e` a failed describe inside $(...) would otherwise
          # abort before the friendly message below.
          if ! DIGEST=$(gcloud artifacts docker images describe "$REF" \
                --format='value(image_summary.fully_qualified_digest)' 2> resolve_err.log); then
            echo "::error::Could not resolve '$REF'. Is it built and pushed, and readable by this tier's deployer SA?"
            cat resolve_err.log >&2 || true
            exit 1
          fi
          if [ -z "$DIGEST" ]; then
            echo "::error::No digest returned for '$REF'."
            exit 1
          fi
          echo "image=$DIGEST" >> "$GITHUB_OUTPUT"
          echo "Deploying digest: $DIGEST"

      - name: Deploy REST API
        if: ${{ inputs.target == 'rest' || inputs.target == 'both' }}
        env:
          IMAGE: ${{ steps.img.outputs.image }}
          PROJECT: ${{ secrets.GCP_PROJECT_ID }}
          REGION: ${{ vars.REGION || 'us-central1' }}
          RUNTIME_SA: ${{ vars.RUNTIME_SA }}
          BUILD_LABEL: ${{ inputs.build_label }}
          CPU: ${{ vars.CPU }}
          MEMORY: ${{ vars.MEMORY }}
          CONCURRENCY: ${{ vars.CONCURRENCY }}
          MIN_INSTANCES: ${{ vars.MIN_INSTANCES }}
          MAX_INSTANCES: ${{ vars.MAX_INSTANCES }}
          DUCKDB_MEMORY_LIMIT: ${{ vars.DUCKDB_MEMORY_LIMIT }}
          DUCKDB_THREADS: ${{ vars.DUCKDB_THREADS }}
          # NCI policy: HSTS everywhere, injected by the app. Prod gets the policy max-age of
          # one year; dev/test get one hour so a misconfigured deploy can't lock browsers out
          # of the domain for a year. Override per tier with an HSTS_MAX_AGE Environment var.
          HSTS_MAX_AGE: ${{ vars.HSTS_MAX_AGE || (inputs.environment == 'prod' && '31536000' || '3600') }}
        run: |
          set -euo pipefail
          args=(
            --image "$IMAGE"
            --project "$PROJECT"
            --region "$REGION"
            --allow-unauthenticated
            --cpu "${CPU:-2}" --memory "${MEMORY:-4Gi}"
            --concurrency "${CONCURRENCY:-40}"
            --min-instances "${MIN_INSTANCES:-0}" --max-instances "${MAX_INSTANCES:-5}"
            --cpu-boost
            --set-env-vars "IDC_API_DUCKDB_MEMORY_LIMIT=${DUCKDB_MEMORY_LIMIT:-3GB},IDC_API_DUCKDB_THREADS=${DUCKDB_THREADS:-2},IDC_API_BUILD=${BUILD_LABEL},IDC_API_HSTS_MAX_AGE=${HSTS_MAX_AGE}"
          )
          [ -n "${RUNTIME_SA:-}" ] && args+=( --service-account "$RUNTIME_SA" )
          gcloud run deploy idc-api-v3 "${args[@]}"

      - name: Deploy MCP service
        if: ${{ inputs.target == 'mcp' || inputs.target == 'both' }}
        env:
          IMAGE: ${{ steps.img.outputs.image }}
          PROJECT: ${{ secrets.GCP_PROJECT_ID }}
          REGION: ${{ vars.REGION || 'us-central1' }}
          RUNTIME_SA: ${{ vars.RUNTIME_SA }}
          BUILD_LABEL: ${{ inputs.build_label }}
          CPU: ${{ vars.CPU }}
          MEMORY: ${{ vars.MEMORY }}
          MIN_INSTANCES: ${{ vars.MIN_INSTANCES }}
          MAX_INSTANCES: ${{ vars.MAX_INSTANCES }}
          DUCKDB_MEMORY_LIMIT: ${{ vars.DUCKDB_MEMORY_LIMIT }}
          DUCKDB_THREADS: ${{ vars.DUCKDB_THREADS }}
          # Same HSTS tiering as the REST deploy above.
          HSTS_MAX_AGE: ${{ vars.HSTS_MAX_AGE || (inputs.environment == 'prod' && '31536000' || '3600') }}
        run: |
          set -euo pipefail
          args=(
            --image "$IMAGE"
            --project "$PROJECT"
            --region "$REGION"
            --allow-unauthenticated
            --cpu "${CPU:-2}" --memory "${MEMORY:-4Gi}"
            --min-instances "${MIN_INSTANCES:-0}" --max-instances "${MAX_INSTANCES:-5}"
            --command idc-mcp
            "--args=--http,--host,0.0.0.0,--port,8080"
            --set-env-vars "IDC_API_DUCKDB_MEMORY_LIMIT=${DUCKDB_MEMORY_LIMIT:-3GB},IDC_API_DUCKDB_THREADS=${DUCKDB_THREADS:-2},IDC_API_BUILD=${BUILD_LABEL},IDC_API_HSTS_MAX_AGE=${HSTS_MAX_AGE}"
          )
          [ -n "${RUNTIME_SA:-}" ] && args+=( --service-account "$RUNTIME_SA" )
          gcloud run deploy idc-mcp-v3 "${args[@]}"

      - name: Verify REST API
        if: ${{ inputs.target == 'rest' || inputs.target == 'both' }}
        env:
          PROJECT: ${{ secrets.GCP_PROJECT_ID }}
          REGION: ${{ vars.REGION || 'us-central1' }}
        run: |
          set -euo pipefail
          URL=$(gcloud run services describe idc-api-v3 --project "$PROJECT" --region "$REGION" --format='value(status.url)')
          # All REST routes live under /v3 (health included); the *.run.app URL has no LB/ESP in
          # front, so these hit the container directly.
          curl -sf "$URL/v3/health"; echo
          curl -sf "$URL/v3/version"; echo
          # NCI policy requires HSTS on every response; fail the deploy if the header is gone.
          # No -f: -I sends HEAD, which FastAPI GET routes answer with 405 — but the middleware
          # stamps the header on every response, and the header is all this line asserts (the
          # GET above already proved the service healthy).
          curl -sI "$URL/v3/health" | grep -i '^strict-transport-security:'
          {
            echo "### REST API deployed to ${{ inputs.environment }}"
            echo "- URL: $URL"
            echo "- Build: \`${{ inputs.build_label }}\`"
            echo "- Image: \`${{ steps.img.outputs.image }}\`"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Smoke-test OpenAPI examples (REST)
        if: ${{ inputs.target == 'rest' || inputs.target == 'both' }}
        env:
          # The tier's public URL behind the load balancer (e.g. https://api.imaging.datacommons.cancer.gov).
          # Required: the test deliberately exercises the surface real users hit — the LB /
          # shared-domain URL map is exactly where routing regressions live (the /v3/* glob gotcha,
          # the ESP fallback; see dev/deployment.md "Shared-domain path routing"), which the
          # *.run.app URL bypasses. If the user-facing URL is missing or not serving, this step
          # fails — it does not fall back to *.run.app.
          PUBLIC_BASE_URL: ${{ vars.PUBLIC_BASE_URL }}
          # Per-tier escape hatch: set SMOKE_SOFT_FAIL=1 as an Environment variable to keep a tier
          # green when a declared example goes stale against that tier's data (still annotated).
          SMOKE_SOFT_FAIL: ${{ vars.SMOKE_SOFT_FAIL }}
        run: |
          set -euo pipefail
          # Exercise every declared OpenAPI example against the just-deployed instance, so a
          # documented value that doesn't resolve (a removed UID, a stale example) fails the
          # deploy instead of silently misleading Swagger-UI users. Reads the live spec — no deps.
          if [ -z "${PUBLIC_BASE_URL:-}" ]; then
            echo "::error::PUBLIC_BASE_URL is not set for the '${{ inputs.environment }}' Environment. Set it to the tier's public URL (behind the load balancer) so the smoke test covers the user-facing surface. See dev/deployment.md."
            exit 1
          fi
          BASE="${PUBLIC_BASE_URL%/}"
          echo "Smoke-testing $BASE (public URL, behind the load balancer)."
          # The LB path-routes to Cloud Run; guard against a URL-map regression that lets the
          # legacy ESP answer instead (nginx "Method does not exist"), and against the domain not
          # serving at all. Cloud Run identifies itself as "Google Frontend"; the ESP does not.
          # Use a GET (not HEAD): FastAPI GET routes answer HEAD with 405, which would trip -f even
          # when routing is fine. -D - dumps the response headers for the grep; -o /dev/null drops
          # the body; -f fails on a non-2xx GET, so an unreachable/erroring public URL fails here.
          if ! curl -sf -D - -o /dev/null "$BASE/v3/version" | grep -iq '^server:[[:space:]]*Google Frontend'; then
            echo "::error::$BASE/v3/version did not respond 2xx from Cloud Run (missing 'Server: Google Frontend') — the public URL is down or a load-balancer / ESP routing regression."
            exit 1
          fi
          python3 dev/smoke_openapi_examples.py "$BASE"

      - name: Verify MCP service
        if: ${{ inputs.target == 'mcp' || inputs.target == 'both' }}
        env:
          PROJECT: ${{ secrets.GCP_PROJECT_ID }}
          REGION: ${{ vars.REGION || 'us-central1' }}
        run: |
          set -euo pipefail
          URL=$(gcloud run services describe idc-mcp-v3 --project "$PROJECT" --region "$REGION" --format='value(status.url)')
          # HSTS must be on the MCP surface too. A bare GET to /mcp is not a valid MCP request
          # (the transport wants a POST with an event-stream Accept), but the middleware adds
          # the header to every response regardless of status — so probe without -f and only
          # require the header.
          curl -sI "$URL/mcp" | grep -i '^strict-transport-security:'
          {
            echo "### MCP service deployed to ${{ inputs.environment }}"
            echo "- URL: $URL/mcp"
            echo "- Build: \`${{ inputs.build_label }}\`"
          } >> "$GITHUB_STEP_SUMMARY"

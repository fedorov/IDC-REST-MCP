name: v3 CI

# Lint + test the v3 API/MCP package (src/idc_api, tests_v3). The existing CircleCI pipeline
# continues to build/deploy v2 independently. Fully offline: tests run against the bundled
# idc-index Parquet — no GCP, network, or credentials required.

on:
  push:
    branches: [idc-api-v3]
    paths:
      - "src/idc_api/**"
      - "tests_v3/**"
      - "pyproject.toml"
      - "uv.lock"
      - ".github/workflows/v3-ci.yml"
  pull_request:
    paths:
      - "src/idc_api/**"
      - "tests_v3/**"
      - "pyproject.toml"
      - "uv.lock"
      - ".github/workflows/v3-ci.yml"

concurrency:
  group: v3-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          python-version: ${{ matrix.python-version }}

      - name: Install (locked deps + dev extras)
        run: uv sync --extra dev --python ${{ matrix.python-version }}

      - name: Lint (ruff)
        run: uv run ruff check src tests_v3

      - name: Test (pytest)
        run: uv run pytest tests_v3 -q

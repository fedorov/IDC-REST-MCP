# Cloud Build config for the IDC API image.
#
#   gcloud builds submit --config dev/cloudbuild.yaml \
#     --substitutions _IMAGE=REGION-docker.pkg.dev/PROJECT_ID/REPO/idc-api:latest
steps:
  - name: gcr.io/cloud-builders/docker
    args: ["build", "-t", "${_IMAGE}", "."]
  - name: gcr.io/cloud-builders/docker
    args: ["push", "${_IMAGE}"]
images: ["${_IMAGE}"]
substitutions:
  _IMAGE: ""
options:
  logging: CLOUD_LOGGING_ONLY
